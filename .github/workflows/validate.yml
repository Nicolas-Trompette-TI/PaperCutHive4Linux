name: Validate

on:
  push:
  pull_request:

jobs:
  shell-and-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3

      - name: Bash syntax check
        run: |
          find scripts release -type f -name "*.sh" -print0 | xargs -0 -n1 bash -n

      - name: ShellCheck
        run: |
          find scripts release -type f -name "*.sh" -print0 | xargs -0 -n1 shellcheck -x

      - name: Python compile check
        run: |
          python3 -m compileall -q scripts tests

      - name: Unit tests
        run: |
          python3 -m unittest discover -s tests -p "test_*.py" -v
